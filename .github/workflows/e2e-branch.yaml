name: E2E test branch
on:
  workflow_call:
    secrets:
      GKE_CREDENTIALS:
        description: "GKE credentials"
      GKE_PROJECT_ID:
        description: "GKE project ID"
      SLACK_WEBHOOK_URL:
        description: "WebHook URL to use for Slack"
        required: true
    inputs:
      branch:
        type: string
        default: "release-v2.9"

env:
  GKE_CREDENTIALS: ${{ secrets.GKE_CREDENTIALS }}
  GKE_PROJECT_ID: ${{ secrets.GKE_PROJECT_ID }}

jobs:
  e2e-tests:
    env:
      BRANCH: ${{ inputs.branch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: |
            ${{ env.BRANCH }}
      - name: Login to GHCR registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build and push image
        env:
          REPO: ghcr.io/rancher
        run: |
          make image-push
      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: 1.25.x
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.23.0
          install_only: true
      - name: Create kind cluster
        run: make setup-kind
      - name: Set the value
        run: |
          GKE_PROJECT_ID="${{ env.GKE_PROJECT_ID }}"
          echo "GKE_PROJECT_ID=${GKE_PROJECT_ID}" >> $GITHUB_ENV
      - name: E2E tests
        env:
          GKE_CREDENTIALS: "${{ secrets.GKE_CREDENTIALS }}"
          REPO: ghcr.io/rancher
        run: make e2e-tests
      - name: Archive artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-artifacts-${{ env.BRANCH }}
          path: _artifacts
          if-no-files-found: ignore
      - name: Send failed status to slack
        if: failure() && github.event_name == 'schedule'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "AKS Operator E2E test run failed."
                    },
                    "accessory": {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": ":github:",
                         "emoji": true
                        },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
